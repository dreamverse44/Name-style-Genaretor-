  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Outfit', sans-serif; overflow: hidden; }

:root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #12122a;
  --surface: rgba(255,255,255,0.06);
  --surface-hover: rgba(255,255,255,0.1);
  --text-primary: #f0f0ff;
  --text-secondary: #8888aa;
  --accent-1: #a855f7;
  --accent-2: #ec4899;
  --accent-3: #6366f1;
  --glow-1: rgba(168,85,247,0.3);
  --glow-2: rgba(236,72,153,0.3);
}

.light-mode {
  --bg-primary: #f5f0ff;
  --bg-secondary: #ede5ff;
  --surface: rgba(120,60,200,0.07);
  --surface-hover: rgba(120,60,200,0.12);
  --text-primary: #1a1035;
  --text-secondary: #6b5f80;
  --accent-1: #9333ea;
  --accent-2: #db2777;
  --accent-3: #4f46e5;
  --glow-1: rgba(147,51,234,0.15);
  --glow-2: rgba(219,39,119,0.15);
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  transition: background 0.4s, color 0.4s;
}

.app-wrapper {
  height: 100%;
  width: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.bg-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 8s ease-in-out infinite;
}
.bg-orb-1 { width: 300px; height: 300px; background: var(--accent-1); top: -100px; left: -80px; }
.bg-orb-2 { width: 250px; height: 250px; background: var(--accent-2); bottom: -80px; right: -60px; animation-delay: -4s; }
.bg-orb-3 { width: 200px; height: 200px; background: var(--accent-3); top: 40%; left: 60%; animation-delay: -2s; }

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(20px, -15px) scale(1.05); }
  66% { transform: translate(-15px, 10px) scale(0.95); }
}

.app-header {
  position: relative;
  z-index: 10;
  padding: 16px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.app-logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.theme-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-primary);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}
.theme-btn:hover { background: var(--surface-hover); transform: scale(1.05); }

.input-section {
  position: relative;
  z-index: 10;
  padding: 0 20px 12px;
}

.input-container {
  position: relative;
  border-radius: 18px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  overflow: hidden;
  transition: all 0.3s;
  box-shadow: 0 4px 24px rgba(0,0,0,0.1);
}
.input-container:focus-within {
  border-color: var(--accent-1);
  box-shadow: 0 0 0 3px var(--glow-1), 0 4px 24px rgba(0,0,0,0.15);
}

.name-input {
  width: 100%;
  padding: 18px 56px 18px 20px;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Outfit', sans-serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--text-primary);
}
.name-input::placeholder { color: var(--text-secondary); opacity: 0.7; }

.generate-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 42px; height: 42px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  border: none;
  color: white;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 16px var(--glow-2);
}
.generate-btn:hover { transform: translateY(-50%) scale(1.08); }
.generate-btn:active { transform: translateY(-50%) scale(0.95); }

.cat-section {
  position: relative;
  z-index: 10;
  padding: 0 0 10px;
}
.cat-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 0 20px;
  scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }

.cat-pill {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
  backdrop-filter: blur(10px);
}
.cat-pill:hover { background: var(--surface-hover); color: var(--text-primary); }
.cat-pill.active {
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  color: white;
  border-color: transparent;
  box-shadow: 0 2px 12px var(--glow-1);
}

.cards-area {
  position: relative;
  z-index: 10;
  flex: 1;
  overflow-y: auto;
  padding: 4px 20px 100px;
  scrollbar-width: thin;
  scrollbar-color: rgba(168,85,247,0.3) transparent;
}
.cards-area::-webkit-scrollbar { width: 4px; }
.cards-area::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); border-radius: 4px; }

.cards-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
@media(min-width:640px) { .cards-grid { grid-template-columns: 1fr 1fr; } }
@media(min-width:1024px) { .cards-grid { grid-template-columns: 1fr 1fr 1fr; } }

.style-card {
  position: relative;
  border-radius: 16px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(16px);
  padding: 16px;
  cursor: pointer;
  transition: all 0.3s;
  animation: cardIn 0.4s ease-out both;
  overflow: hidden;
}
.style-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  opacity: 0;
  background: linear-gradient(135deg, var(--glow-1), var(--glow-2));
  transition: opacity 0.3s;
}
.style-card:hover { transform: translateY(-2px); border-color: rgba(168,85,247,0.2); }
.style-card:hover::before { opacity: 1; }

.card-label {
  position: relative;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--accent-1);
  margin-bottom: 8px;
}
.card-text {
  position: relative;
  font-size: 17px;
  line-height: 1.5;
  word-break: break-all;
  color: var(--text-primary);
  min-height: 28px;
}
.card-actions {
  position: relative;
  display: flex;
  gap: 6px;
  margin-top: 12px;
  justify-content: flex-end;
}
.card-action-btn {
  width: 32px; height: 32px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}
.card-action-btn:hover { background: var(--accent-1); color: white; transform: scale(1.1); }
.card-action-btn.fav-active { color: var(--accent-2); }
.card-action-btn.fav-active:hover { background: var(--accent-2); color: white; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 12px 28px;
  border-radius: 100px;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  color: white;
  font-weight: 600;
  font-size: 14px;
  z-index: 999;
  pointer-events: none;
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 8px 32px var(--glow-2);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 10px 20px 14px;
  background: var(--bg-secondary);
  border-top: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.3s;
  background: none;
  border: none;
  font-family: 'Outfit', sans-serif;
  padding: 4px 12px;
}
.nav-item.active { color: var(--accent-1); }
.nav-item:hover { color: var(--accent-1); }
.nav-label { font-size: 11px; font-weight: 500; }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  text-align: center;
}
.empty-emoji { font-size: 56px; margin-bottom: 16px; }
.empty-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
.empty-sub { font-size: 14px; color: var(--text-secondary); }

.settings-panel {
  position: relative;
  z-index: 10;
  flex: 1;
  overflow-y: auto;
  padding: 4px 20px 100px;
}
.settings-group {
  margin-bottom: 20px;
}
.settings-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.settings-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  border-radius: 14px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 8px;
  backdrop-filter: blur(10px);
}
.settings-item-label { font-size: 15px; font-weight: 500; }
.toggle {
  width: 48px; height: 26px;
  border-radius: 13px;
  background: rgba(255,255,255,0.15);
  position: relative;
  cursor: pointer;
  transition: all 0.3s;
  border: none;
}
.toggle.on { background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); }
.toggle-knob {
  width: 20px; height: 20px;
  border-radius: 10px;
  background: white;
  position: absolute;
  top: 3px;
  left: 3px;
  transition: all 0.3s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.toggle.on .toggle-knob { left: 25px; }

.font-size-control {
  display: flex;
  align-items: center;
  gap: 12px;
}
.fs-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--surface-hover);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-primary);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px; font-weight: 700;
  transition: all 0.2s;
}
.fs-btn:hover { background: var(--accent-1); color: white; }
.fs-value { font-size: 15px; font-weight: 600; min-width: 32px; text-align: center; }

.page { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.page.active { display: flex; }

.fav-count {
  position: absolute;
  top: -4px; right: -4px;
  min-width: 16px; height: 16px;
  border-radius: 8px;
  background: var(--accent-2);
  color: white;
  font-size: 10px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
}

function mapText(text, map) { return [...text].map(c => map[c] || c).join(''); }
function spaced(text) { return [...text].join(' '); }

function zalgo(text, intensity) {
  const zalgoUp = ['\u030d','\u030e','\u0304','\u0305','\u033f','\u0311','\u0306','\u0310','\u0352','\u0357','\u0351','\u0307','\u0308','\u030a','\u0342','\u0343','\u0344','\u034a','\u034b','\u034c'];
  const zalgoMid = ['\u0315','\u031b','\u0340','\u0341','\u0358','\u0321','\u0322','\u0327','\u0328','\u0334','\u0335','\u0336','\u034f','\u035c','\u035d','\u035e','\u035f','\u0360','\u0362'];
  const zalgoDown = ['\u0316','\u0317','\u0318','\u0319','\u031c','\u031d','\u031e','\u031f','\u0320','\u0324','\u0325','\u0326','\u0329','\u032a','\u032b','\u032c','\u032d','\u032e','\u032f','\u0330','\u0331','\u0332','\u0333','\u0339','\u033a','\u033b','\u033c','\u0345'];
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  return [...text].map(c => { let r = c; for(let i=0;i<intensity;i++) { r += pick(zalgoUp); r += pick(zalgoMid); r += pick(zalgoDown); } return r; }).join('');
}

let currentName = '';
let activeCat = 'all';
let generatedStyles = [];
let favorites = [];
let isDark = true;
let cardFontSize = 17;
let currentPage = 'home';

function renderCategories() {
  const el = document.getElementById('catScroll');
  el.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const pill = document.createElement('button');
    pill.className = `cat-pill${cat.id === activeCat ? ' active' : ''}`;
    pill.textContent = cat.label;
    pill.addEventListener('click', () => { activeCat = cat.id; renderCategories(); renderStyles(); });
    el.appendChild(pill);
  });
}

function generateStyles(name) {
  if (!name.trim()) return [];
  return STYLES.map((s, i) => ({ id: i, name: s.name, category: s.cat, styled: s.fn(name.trim()) }));
}

function renderStyles() {
  const grid = document.getElementById('cardsGrid');
  const empty = document.getElementById('emptyHome');

  if (!generatedStyles.length) { grid.innerHTML = ''; empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  const filtered = activeCat === 'all' ? generatedStyles : generatedStyles.filter(s => s.category === activeCat);
  const existing = new Map([...grid.children].map(el => [el.dataset.styleId, el]));
  const newIds = new Set(filtered.map(s => String(s.id)));

  existing.forEach((el, id) => { if (!newIds.has(id)) el.remove(); });

  filtered.forEach((style, idx) => {
    const sid = String(style.id);
    if (existing.has(sid)) {
      const card = existing.get(sid);
      card.querySelector('.card-text').textContent = style.styled;
      card.dataset.styledText = style.styled;
      const isFav = favorites.some(f => f === style.styled);
      const hb = card.querySelector('.fav-btn');
      if (hb) hb.classList.toggle('fav-active', isFav);
    } else {
      const card = document.createElement('div');
      card.className = 'style-card';
      card.dataset.styleId = sid;
      card.dataset.styledText = style.styled;
      card.style.animationDelay = `${idx * 0.04}s`;

      const isFav = favorites.some(f => f === style.styled);
      card.innerHTML = `
        <div class="card-label">${style.name}</div>
        <div class="card-text" style="font-size:${cardFontSize}px">${escapeHtml(style.styled)}</div>
        <div class="card-actions">
          <button class="card-action-btn copy-btn" aria-label="Copy text"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg></button>
          <button class="card-action-btn fav-btn ${isFav ? 'fav-active' : ''}" aria-label="Toggle favorite"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></button>
        </div>
      `;

      card.addEventListener('click', (e) => { if (e.target.closest('.card-action-btn')) return; copyToClipboard(style.styled); });
      card.querySelector('.copy-btn').addEventListener('click', (e) => { e.stopPropagation(); copyToClipboard(style.styled); });
      card.querySelector('.fav-btn').addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(style.styled); });

      grid.appendChild(card);
    }
  });
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => showToast('Copied! ✨')).catch(() => { const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); showToast('Copied! ✨'); }); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }

function toggleFavorite(text) {
  const idx = favorites.indexOf(text);
  if (idx > -1) { favorites.splice(idx, 1); showToast('Removed from favorites'); }
  else { favorites.push(text); showToast('Added to favorites 💜'); }
  updateFavBadge();
  if (currentPage === 'favs') renderFavorites();
  renderStyles();
}

function updateFavBadge() {
  const badge = document.getElementById('favBadge');
  if (favorites.length > 0) { badge.style.display = 'flex'; badge.textContent = favorites.length; }
  else { badge.style.display = 'none'; }
}

function renderFavorites() {
  const grid = document.getElementById('favsGrid');
  const empty = document.getElementById('emptyFavs');

  if (!favorites.length) { grid.innerHTML = ''; empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  grid.innerHTML = '';

  favorites.forEach((text, idx) => {
    const card = document.createElement('div');
    card.className = 'style-card';
    card.style.animationDelay = `${idx * 0.04}s`;
    card.innerHTML = `
      <div class="card-label">Favorite</div>
      <div class="card-text" style="font-size:${cardFontSize}px">${escapeHtml(text)}</div>
      <div class="card-actions">
        <button class="card-action-btn copy-btn" aria-label="Copy"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg></button>
        <button class="card-action-btn fav-btn fav-active" aria-label="Remove favorite"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 4 21 4 23 6 23 20a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V6z"></polyline></svg></button>
      </div>
    `;
    card.addEventListener('click', (e) => { if (e.target.closest('.card-action-btn')) return; copyToClipboard(text); });
    card.querySelector('.copy-btn').addEventListener('click', (e) => { e.stopPropagation(); copyToClipboard(text); });
    card.querySelector('.fav-btn').addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(text); });
    grid.appendChild(card);
  });
}

function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  if (page === 'home') document.getElementById('homePage').classList.add('active');
  else if (page === 'favs') { document.getElementById('favsPage').classList.add('active'); renderFavorites(); }
  else if (page === 'settings') document.getElementById('settingsPage').classList.add('active');

  document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
}

document.querySelectorAll('.nav-item').forEach(btn => { btn.addEventListener('click', () => switchPage(btn.dataset.page)); });

function setTheme(dark) {
